<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Critical - Test AssemblyAI</title>
    <link rel="stylesheet" href="/static/style.css?v=1.9">
</head>
<body>
    <div class="container">
        <header>
            <h1>Critical.</h1>
            <p class="subtitle">Fact-checking en temps réel</p>
            <p class="debug-info">[AssemblyAI - Détection auto de langue]</p>
        </header>

        <main>
            <div class="mode-toggle">
                <div class="mode-toggle-track" id="mode-track">
                    <div class="slider"></div>
                    <button id="mode-eco" class="mode-btn active">Économie</button>
                    <button id="mode-perf" class="mode-btn">Performance</button>
                </div>
            </div>

            <section class="input-section">
                <!-- Instagram URL transcription -->
                <div class="instagram-section">
                    <h3>Transcrire depuis Instagram</h3>
                    <div class="instagram-input-row">
                        <input type="text" id="instagram-url" placeholder="https://www.instagram.com/reel/..." class="instagram-input">
                        <button id="instagram-button" class="instagram-button">Transcrire</button>
                    </div>
                    <div id="instagram-status" class="status" style="display: none;"></div>
                    <div id="instagram-result" class="instagram-result" style="display: none;"></div>
                </div>

                <hr style="margin: 20px 0; border-color: #333;">

                <!-- Pure text input -->
                <div class="text-section">
                    <h3>Entrer du texte directement</h3>
                    <textarea id="text-input" class="text-input" rows="4" placeholder="Collez ou tapez votre texte ici..."></textarea>
                    <button id="text-button" class="instagram-button" style="margin-top: 0.5rem;">Envoyer</button>
                    <div id="text-status" class="status" style="display: none;"></div>
                </div>

                <hr style="margin: 20px 0; border-color: #333;">

                <!-- Microphone transcription -->
                <h3>Transcrire depuis le micro</h3>
                <div class="mode-selector">
                    <label>
                        <input type="radio" name="stt-mode" value="micro" checked>
                        Micro (dictée courte, 10s timeout)
                    </label>
                    <label>
                        <input type="radio" name="stt-mode" value="speech">
                        Speech (discours long, 20s timeout)
                    </label>
                </div>
                <button id="mic-button" class="mic-button">
                    <span class="mic-icon">🎤</span>
                    <span class="mic-text">Appuyer pour parler</span>
                </button>
                <div id="status" class="status">Prêt</div>
                <div id="debug" class="debug-panel">
                    <strong>Debug:</strong>
                    <div id="debug-log"></div>
                </div>
            </section>

            <section class="transcription-section">
                <h2>Transcription</h2>
                <div id="transcription" class="transcription-box">
                    <span class="placeholder">La transcription apparaîtra ici...</span>
                </div>
            </section>

            <section class="result-section" id="result-section" style="display: none;">
                <h2>Résultat</h2>
                <div id="result" class="result-box"></div>
            </section>
        </main>

        <footer>
            <p>Interface de test locale - AssemblyAI</p>
            <p class="version">v1.9</p>
        </footer>
    </div>

    <script src="/static/app_poc.js?v=1.8"></script>
    <script>
        // FR: Toggle mode Économie / Performance
        let currentMode = 'eco';
        const modeEco = document.getElementById('mode-eco');
        const modePerf = document.getElementById('mode-perf');
        const modeTrack = document.getElementById('mode-track');

        modeEco.addEventListener('click', () => {
            currentMode = 'eco';
            modeEco.classList.add('active');
            modePerf.classList.remove('active');
            modeTrack.classList.remove('performance');
        });
        modePerf.addEventListener('click', () => {
            currentMode = 'performance';
            modePerf.classList.add('active');
            modeEco.classList.remove('active');
            modeTrack.classList.add('performance');
        });

        // FR: Gestion de la transcription Instagram
        const instagramButton = document.getElementById('instagram-button');
        const instagramUrl = document.getElementById('instagram-url');
        const instagramStatus = document.getElementById('instagram-status');
        const instagramResult = document.getElementById('instagram-result');

        instagramButton.addEventListener('click', async () => {
            const url = instagramUrl.value.trim();
            if (!url) {
                alert('Veuillez entrer une URL Instagram');
                return;
            }

            // FR: Afficher le statut de chargement
            instagramButton.disabled = true;
            instagramButton.textContent = 'En cours...';
            instagramStatus.style.display = 'block';
            instagramStatus.textContent = 'Téléchargement et transcription en cours...';
            instagramStatus.className = 'status loading';
            instagramResult.style.display = 'none';

            try {
                const response = await fetch('/api/transcribe/instagram', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url, mode: currentMode })
                });

                const data = await response.json();

                if (data.status === 'completed') {
                    // FR: Formater la date (YYYYMMDD -> DD/MM/YYYY)
                    let dateStr = data.upload_date;
                    if (dateStr && dateStr.length === 8) {
                        dateStr = `${dateStr.slice(6,8)}/${dateStr.slice(4,6)}/${dateStr.slice(0,4)}`;
                    }

                    // FR: Avertissement si confiance faible
                    const confidence = Math.round(data.confidence * 100);
                    const confidenceWarning = confidence < 80 ? ` ⚠️ Confiance faible (${confidence}%)` : '';

                    instagramStatus.className = 'status success';
                    instagramResult.style.display = 'block';
                    instagramResult.innerHTML = `
                        <div class="debug-info">Source: @${data.uploader || '?'} • ${dateStr || '?'}${confidenceWarning}</div>
                        <div style="margin-top: 8px; color: var(--text-light);">(Transcription affichée dans le terminal backend)</div>
                    `;
                    instagramStatus.style.display = 'none';
                } else {
                    instagramStatus.textContent = `Erreur: ${data.message}`;
                    instagramStatus.className = 'status error';
                }
            } catch (error) {
                instagramStatus.textContent = `Erreur: ${error.message}`;
                instagramStatus.className = 'status error';
            } finally {
                instagramButton.disabled = false;
                instagramButton.textContent = 'Transcrire';
            }
        });

        // FR: Permettre de lancer avec Enter
        instagramUrl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') instagramButton.click();
        });

        // FR: Gestion de l'envoi de texte pur
        const textButton = document.getElementById('text-button');
        const textInput = document.getElementById('text-input');
        const textStatus = document.getElementById('text-status');

        textButton.addEventListener('click', async () => {
            const text = textInput.value.trim();
            if (!text) {
                alert('Veuillez entrer du texte');
                return;
            }

            textButton.disabled = true;
            textButton.textContent = 'Envoi...';
            textStatus.style.display = 'block';
            textStatus.textContent = 'Envoi du texte...';
            textStatus.className = 'status loading';

            try {
                const response = await fetch('/api/text', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, mode: currentMode })
                });

                const data = await response.json();

                if (data.status === 'ok') {
                    textStatus.textContent = data.message;
                    textStatus.className = 'status success';

                    // FR: Afficher le texte dans la zone de transcription
                    const transcriptionEl = document.getElementById('transcription');
                    transcriptionEl.innerHTML = `<span class="final">${data.text}</span>`;
                } else {
                    textStatus.textContent = `Erreur: ${data.message}`;
                    textStatus.className = 'status error';
                }
            } catch (error) {
                textStatus.textContent = `Erreur: ${error.message}`;
                textStatus.className = 'status error';
            } finally {
                textButton.disabled = false;
                textButton.textContent = 'Envoyer';
            }
        });

        // FR: Permettre d'envoyer avec Ctrl+Enter
        textInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) textButton.click();
        });
    </script>
</body>
</html>
